name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: eventmesh_test
          POSTGRES_USER: eventmesh
          POSTGRES_PASSWORD: eventmesh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventmesh -d eventmesh_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:4-alpine
        env:
          RABBITMQ_DEFAULT_USER: eventmesh
          RABBITMQ_DEFAULT_PASS: eventmesh
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    env:
      EVENTMESH_POSTGRES_CONNECTION: Host=localhost;Port=5432;Database=eventmesh_test;Username=eventmesh;Password=eventmesh_test
      EVENTMESH_REDIS_CONNECTION: localhost:6379
      EVENTMESH_RABBITMQ_HOST: localhost
      EVENTMESH_RABBITMQ_PORT: 5672
      EVENTMESH_RABBITMQ_USER: eventmesh
      EVENTMESH_RABBITMQ_PASSWORD: eventmesh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore EventMesh.slnx

      - name: Build
        run: dotnet build EventMesh.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test EventMesh.slnx
          --configuration Release
          --no-build
          --verbosity normal

  publish-nuget:
    name: Publish NuGet Packages
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Restore
        run: dotnet restore EventMesh.slnx

      - name: Pack
        run: >
          dotnet pack EventMesh.slnx
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}
          -p:ContinuousIntegrationBuild=true
          --output ./artifacts

      - name: Push to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-nuget
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*.nupkg
