name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore EventMesh.slnx

      - name: Build
        run: dotnet build EventMesh.slnx --configuration Release --no-restore

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: eventmesh_test
          POSTGRES_USER: eventmesh
          POSTGRES_PASSWORD: eventmesh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventmesh -d eventmesh_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:4-alpine
        env:
          RABBITMQ_DEFAULT_USER: eventmesh
          RABBITMQ_DEFAULT_PASS: eventmesh
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    env:
      EVENTMESH_POSTGRES_CONNECTION: Host=localhost;Port=5432;Database=eventmesh_test;Username=eventmesh;Password=eventmesh_test
      EVENTMESH_REDIS_CONNECTION: localhost:6379
      EVENTMESH_RABBITMQ_HOST: localhost
      EVENTMESH_RABBITMQ_PORT: 5672
      EVENTMESH_RABBITMQ_USER: eventmesh
      EVENTMESH_RABBITMQ_PASSWORD: eventmesh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore EventMesh.slnx

      - name: Build
        run: dotnet build EventMesh.slnx --configuration Release --no-restore

      - name: Run tests
        run: >
          dotnet test EventMesh.slnx
          --configuration Release
          --no-build
          --verbosity normal
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --logger "trx;LogFileName=test-results.trx"
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./TestResults/coverage/

      - name: Enforce milestone coverage gate
        run: >
          dotnet test tests/EventMesh.Integration.Tests/EventMesh.Integration.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./TestResults/milestone-coverage/
          /p:Include="[EventMesh.Plugin.Compression.Gzip]*,[EventMesh.Plugin.Compression.Zstd]*,[EventMesh.Plugin.Encryption.AesGcm]*,[EventMesh.Plugin.Exporter.Prometheus]*,[EventMesh.SchemaRegistry]*,[EventMesh.Security]*,[EventMesh.Plugin.Sdk]*"
          /p:Threshold=50
          /p:ThresholdType=line

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 14

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore EventMesh.slnx

      - name: Check code formatting
        run: dotnet format EventMesh.slnx --verify-no-changes --verbosity diagnostic

      - name: Check for TODO comments in source
        run: |
          if rg -i "TODO|FIXME|HACK|NotImplementedException" src/ cli/ sdk/ plugins/ samples/ --glob "*.cs" -q; then
            echo "::error::Found TODO/FIXME/HACK or NotImplementedException in source code"
            rg -i "TODO|FIXME|HACK|NotImplementedException" src/ cli/ sdk/ plugins/ samples/ --glob "*.cs"
            exit 1
          fi
          echo "No prohibited placeholders found in source code"

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install and build
        working-directory: dashboard
        run: npm ci && npm run build
