name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmarks/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmarks/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
  workflow_dispatch:
    inputs:
      filter:
        description: 'Benchmark filter (class or method name; empty = all)'
        required: false
        default: ''

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore benchmarks/EventMesh.Benchmarks/EventMesh.Benchmarks.csproj

      - name: Build benchmarks
        run: dotnet build benchmarks/EventMesh.Benchmarks/EventMesh.Benchmarks.csproj --configuration Release --no-restore

      - name: Run benchmarks
        run: |
          FILTER="${{ github.event.inputs.filter }}"
          ARGS="-c Release --no-build --exporters json html csv markdown"
          if [ -n "$FILTER" ]; then
            ARGS="$ARGS --filter \"*$FILTER*\""
          fi
          dotnet run --project benchmarks/EventMesh.Benchmarks $ARGS \
            --artifacts ./BenchmarkResults

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: BenchmarkResults/
          retention-days: 30

      - name: Compare against baseline
        if: github.event_name == 'pull_request'
        run: |
          if [ -f BenchmarkResults/baseline.json ]; then
            echo "Baseline comparison configured — review results in artifacts"
          else
            echo "No baseline file found; skipping comparison (first run or baseline not yet established)"
          fi

  benchmark-summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: BenchmarkResults/

      - name: Display summary
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f BenchmarkResults/results.json ]; then
            echo "Benchmark run completed. See artifacts for full results." >> $GITHUB_STEP_SUMMARY
          else
            echo "Benchmark artifacts generated. Download for detailed analysis." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Performance Targets" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| InMemory throughput | 100,000+ msg/s |" >> $GITHUB_STEP_SUMMARY
          echo "| InMemory P95 latency | < 5 ms |" >> $GITHUB_STEP_SUMMARY
