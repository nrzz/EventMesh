apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eventmesh.fullname" . }}-management-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "eventmesh.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "eventmesh.name" . }}-management-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "eventmesh.name" . }}-management-api
        {{- include "eventmesh.labels" . | nindent 8 }}
    spec:
      containers:
        - name: management-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: ASPNETCORE_URLS
              value: {{ .Values.env.aspnetCoreUrls | quote }}
            {{- if .Values.secrets.apiKeys }}
            - name: EVENTMESH_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ include "eventmesh.fullname" . }}-management-api
                  key: api-keys
            {{- end }}
            {{- if .Values.config.jwtAuthority }}
            - name: EVENTMESH_JWT_AUTHORITY
              value: {{ .Values.config.jwtAuthority | quote }}
            {{- end }}
            {{- if .Values.config.jwtAudience }}
            - name: EVENTMESH_JWT_AUDIENCE
              value: {{ .Values.config.jwtAudience | quote }}
            {{- end }}
            {{- if .Values.config.vaultAddr }}
            - name: VAULT_ADDR
              value: {{ .Values.config.vaultAddr | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
