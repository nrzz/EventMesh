replicaCount: 2

image:
  repository: ghcr.io/eventmesh/management-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  aspnetCoreUrls: http://+:8080

secrets:
  apiKeys: ""

config:
  jwtAuthority: ""
  jwtAudience: ""
  vaultAddr: ""

namespace: eventmesh
